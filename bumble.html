<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bumble Story</title><link rel="stylesheet" href="bumble.css"></head><body>
<div class="phone">
<div class="header"><div class="logo">bumble</div></div>
<div class="card-wrap">
<div class="card" id="card">
<img src="assets/photos/profile.jpg" alt="Pranav and Yoshu">
<div class="gradient"></div>
<div class="info">
<h2>Pranav, 28</h2>
<p>Probably the best swipe you ever made ❤️</p>
</div>
</div>
</div>
<div class="actions">
<button id="pass">✕</button>
<button id="like">❤</button>
</div>
</div>

<div id="match" class="match hidden">
<h1>💛 It's a Match!</h1>
<p>Some matches are meant to last.</p>
<button id="continue">Say Hi →</button>
</div>
<script src="bumble.js"></script>
</body></html>
